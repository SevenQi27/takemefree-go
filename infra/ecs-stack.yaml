AWSTemplateFormatVersion: "2010-09-09"
Description: >
  takemefree-go 作业2：ECR+ECS(Fargate/ARM64)+ALB+CloudMap+Lambda 自包含栈。
  设计取舍：纯公有子网省掉 NAT Gateway；RDS 最低配可公网访问（SG 锁到服务SG+你的IP）；
  Lambda 用内联代码免打包。全栈一键 delete-stack 拆除。

Parameters:
  AppName:
    Type: String
    Default: takemefree-go
  ImageUri:
    Type: String
    Description: ECR 镜像完整 URI（含 tag），先推镜像再建栈
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 16
  MyIpCidr:
    Type: String
    Description: 你的公网IP/32，用于本机 psql 初始化 schema（curl -s ifconfig.me）
    AllowedPattern: '^\d+\.\d+\.\d+\.\d+/32$'

Resources:
  # ---------- 网络：VPC + 两个公有子网（RDS 子网组要求跨2个AZ），无 NAT ----------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.30.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: !Sub "${AppName}-vpc" }]

  Igw:
    Type: AWS::EC2::InternetGateway
  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: { VpcId: !Ref Vpc, InternetGatewayId: !Ref Igw }

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.30.0.0/24
      MapPublicIpOnLaunch: true
  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.30.1.0/24
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties: { VpcId: !Ref Vpc }
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw
  RtAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { RouteTableId: !Ref RouteTable, SubnetId: !Ref SubnetA }
  RtAssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { RouteTableId: !Ref RouteTable, SubnetId: !Ref SubnetB }

  # ---------- 安全组：ALB(80开放) → 服务(8080只收ALB) → 库(5432只收服务+你IP) ----------
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB ingress 80
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }

  ServiceSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate service, only from ALB
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 8080, ToPort: 8080, SourceSecurityGroupId: !Ref AlbSg }

  DbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Postgres, from service SG and my IP
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 5432, ToPort: 5432, SourceSecurityGroupId: !Ref ServiceSg }
        - { IpProtocol: tcp, FromPort: 5432, ToPort: 5432, CidrIp: !Ref MyIpCidr }

  # ---------- 数据库：最低配标准 Postgres（非 Aurora），删栈即删库 ----------
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: public subnets for class demo
      SubnetIds: [!Ref SubnetA, !Ref SubnetB]

  Db:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: postgres
      EngineVersion: "16"
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: "20"
      StorageType: gp3
      DBName: takemefree
      MasterUsername: appuser
      MasterUserPassword: !Ref DBPassword
      PubliclyAccessible: true
      MultiAZ: false
      BackupRetentionPeriod: 0
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [!GetAtt DbSg.GroupId]

  # ---------- CloudMap：DNS 命名空间(ECS自动注册) + HTTP 命名空间(手工注册 Lambda) ----------
  DnsNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: takemefree.local
      Vpc: !Ref Vpc

  EcsDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: web
      NamespaceId: !Ref DnsNamespace
      DnsConfig:
        DnsRecords: [{ Type: A, TTL: 10 }]
      HealthCheckCustomConfig: { FailureThreshold: 1 }

  HttpNamespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: takemefree-registry

  LambdaDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: hello-lambda
      NamespaceId: !GetAtt HttpNamespace.Id

  LambdaInstance:
    Type: AWS::ServiceDiscovery::Instance
    Properties:
      ServiceId: !GetAtt LambdaDiscoveryService.Id
      InstanceId: hello-lambda-v1
      InstanceAttributes:
        lambdaArn: !GetAtt HelloFunction.Arn

  # ---------- Lambda：内联代码，被 Go 服务经 CloudMap 发现后 SDK 调用 ----------
  HelloFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-hello"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt HelloFunctionRole.Arn
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              return {"message": "hello from Lambda, discovered via CloudMap",
                      "requestId": context.aws_request_id}

  # ---------- ECS：集群 / 两个IAM角色 / 任务定义(ARM64) / 服务 ----------
  Cluster:
    Type: AWS::ECS::Cluster
    Properties: { ClusterName: !Sub "${AppName}-cluster" }

  # execution role：ECS 基础设施用（拉 ECR 镜像、写 CloudWatch 日志）
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # task role：容器里的业务代码用（查 CloudMap、调 Lambda）——与 execution role 的区别是面试高频题
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: discover-and-invoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: servicediscovery:DiscoverInstances
                Resource: "*"
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt HelloFunction.Arn

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AppName}"
      RetentionInDays: 7

  TaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref AppName
      RequiresCompatibilities: [FARGATE]
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RuntimePlatform: { CpuArchitecture: ARM64, OperatingSystemFamily: LINUX }
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ImageUri
          PortMappings: [{ ContainerPort: 8080 }]
          Environment:
            # 课堂简化：连接串直接进环境变量。生产做法是 Secrets Manager + secrets 字段注入
            - Name: DATABASE_URL
              Value: !Sub "postgresql://appuser:${DBPassword}@${Db.Endpoint.Address}:5432/takemefree"
            - Name: DISCOVERY_NAMESPACE
              Value: takemefree-registry
            - Name: DISCOVERY_SERVICE
              Value: hello-lambda
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Subnets: [!Ref SubnetA, !Ref SubnetB]
      SecurityGroups: [!Ref AlbSg]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      TargetType: ip
      Protocol: HTTP
      Port: 8080
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 15
      HealthyThresholdCount: 2

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions: [{ Type: forward, TargetGroupArn: !Ref TargetGroup }]

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Sub "${AppName}-svc"
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED   # 公有子网直接出网拉镜像，替代 NAT
          Subnets: [!Ref SubnetA, !Ref SubnetB]
          SecurityGroups: [!Ref ServiceSg]
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup
      ServiceRegistries:
        - RegistryArn: !GetAtt EcsDiscoveryService.Arn

Outputs:
  AlbUrl:
    Value: !Sub "http://${Alb.DNSName}"
  DbEndpoint:
    Value: !GetAtt Db.Endpoint.Address
  ClusterName:
    Value: !Ref Cluster
