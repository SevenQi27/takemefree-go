# 本地开发数据库：与 .env.example 的 DATABASE_URL 对应。
# schema.sql / seed.sql 挂进 initdb 目录，首次启动自动建表+灌数据。
services:
  postgres:
    image: postgres:16-alpine
    container_name: takemefree-go-pg
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: takemefree
    ports:
      # 宿主机 5433：本机 homebrew PostgreSQL 占了 5432，避开
      - "5433:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
