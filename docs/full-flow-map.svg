<svg viewBox="0 0 1440 1125" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'PingFang SC', 'Segoe UI', Roboto, sans-serif">
  <title>takemefree-go 全要素图：代码走向 + 请求走向</title>
  <desc>左列开发侧(GitHub/Actions/OIDC)，中列构建与控制面(STS/CodeBuild/ECR/SSM/CloudFormation/IAM)，右列运行态(VPC/子网/ALB/任务/RDS/CloudMap/Lambda/CloudWatch)；虚线为代码与发布流 C1-C12，实线为请求流 R1-R8，另有运维路径 O1/O2</desc>
  <style>
    .t  { font-size: 14px; fill: #111827; }
    .ts { font-size: 12px; fill: #6b7280; }
    .bt { font-size: 14px; fill: #1e3a8a; }
    .bs { font-size: 12px; fill: #3b5bd0; }
    .gt { font-size: 14px; fill: #134e4a; }
    .gs { font-size: 12px; fill: #0f766e; }
    .lb { font-size: 12px; fill: #4b5563; }
  </style>
  <rect x="0" y="0" width="1440" height="1125" fill="#ffffff"/>
